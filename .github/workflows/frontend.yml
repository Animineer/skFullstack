name: Frontend Build

on:
  push:
    paths:
      - 'skEnterprices-frontend-main/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skEnterprices-frontend-main

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Packages
        run: npm install

      - name: List Files
        run: ls -R

      - name: Build React App
        run: npm run build

